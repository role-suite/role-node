services:
  demo-db-mysql:
    image: mysql:8.4
    container_name: role-demo-mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: role_demo
      MYSQL_USER: role
      MYSQL_PASSWORD: role
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    tmpfs:
      - /var/lib/mysql
